# backend/alembic.ini

[alembic]
# Путь к скриптам миграций
script_location = alembic

# Префикс для файлов миграций (001_initial.py, 002_add_...)
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Часовой пояс для timestamp'ов
timezone = UTC

# Максимальная длина slug (для имени миграции)
truncate_slug_length = 40

# Сравнивать ли типы при autogenerate
compare_type = true

# Сравнивать ли server defaults
compare_server_default = true

# Префикс для сравнения enum'ов
# sqlalchemy.url НЕ УКАЗЫВАЕМ — берём из env.py через settings

[post_write_hooks]
# После создания миграции — авто-форматирование через ruff
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
